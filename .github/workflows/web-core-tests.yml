name: Web Core Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-core-tests:
    name: web-core-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Run web core tests
        run: npm --prefix web run test:core
