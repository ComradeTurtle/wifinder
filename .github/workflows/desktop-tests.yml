name: Desktop Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-tests:
    name: desktop-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run desktop tests
        run: python -m unittest discover -s desktop/tests -v
